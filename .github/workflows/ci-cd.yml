name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]  # 监听主分支推送
  pull_request:
    branches: [ main, master ]  # 监听 PR 到主分支

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: 类型检查 (TypeScript)
        # 💡 这一步专门查 TS 错误，不通过就不打包
        run: npm exec tsc --noEmit

      - name: Build
        run: npm run build

  deploy:
    needs: build  # 依赖 build 任务，只有 build 成功才会执行
    runs-on: ubuntu-latest # 部署任务在 Ubuntu 最新版本上运行
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')  # 只在主分支推送时部署

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      # 这里添加部署步骤，例如部署到 Vercel、Netlify 等
      # 示例：部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist